<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title th:text="${assignment.title}">Assignment</title>
    <!-- Theme: body font injected per-theme to avoid CSS inline quoting issues -->
    <style th:if="${theme.name() == 'CLASSIC'}">
      body {
        font-family: "Times New Roman", Times, serif;
        font-size: 13px;
        line-height: 1.5;
        color: #111;
        margin: 0;
        padding: 0;
      }
    </style>
    <style th:if="${theme.name() == 'FRIENDLY'}">
      body {
        font-family: "NotoSans", sans-serif;
        font-size: 14px;
        line-height: 1.7;
        color: #111;
        margin: 0;
        padding: 0;
      }
    </style>
    <style th:if="${theme.name() == 'COMPACT'}">
      body {
        font-family: "NotoSans", sans-serif;
        font-size: 11px;
        line-height: 1.35;
        color: #111;
        margin: 0;
        padding: 0;
      }
    </style>
    <style>
      /* base reset — actual font/size/line-height set by per-theme block above */

      @page {
        size: A4;
        margin: 20mm 18mm 20mm 18mm;
        @bottom-right {
          content: counter(page) " / " counter(pages);
          font-size: 11px;
          color: #888;
        }
      }

      /* ── Header ── */
      .header {
        margin-bottom: 14px;
      }
      .header-top {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 8px;
      }
      .header-top td {
        vertical-align: top;
        padding: 0;
        font-size: 12px;
      }
      .header-top-left {
        width: 50%;
        text-align: center;
      }
      .header-top-right {
        width: 50%;
        text-align: center;
      }
      .dept-name {
        font-weight: bold;
        text-transform: uppercase;
        font-size: 13px;
        margin: 0;
      }
      .inst-name {
        font-weight: bold;
        font-size: 13px;
        margin: 2px 0 0 0;
        text-decoration: underline;
      }
      .exam-period {
        font-weight: bold;
        text-transform: uppercase;
        font-size: 14px;
        margin: 0;
      }
      .exam-subject {
        font-size: 14px;
        margin: 2px 0 0 0;
      }
      .exam-duration {
        font-size: 13px;
        font-style: italic;
        margin: 2px 0 0 0;
      }
      .header-title-area {
        text-align: center;
        padding-bottom: 4px;
      }
      .assignment-title {
        font-size: 17px;
        font-weight: bold;
        margin: 0 0 4px 0;
      }
      .assignment-description {
        font-size: 11px;
        margin: 3px 0 0 0;
        font-style: italic;
      }
      .meta-row {
        font-size: 11px;
        margin: 3px 0 0 0;
      }
      .badge {
        display: inline-block;
        font-size: 10px;
        margin-right: 4px;
      }
      .header-separator {
        border: none;
        border-top: 1px solid #ccc;
        margin: 10px 0 0 0;
      }
      .student-info {
        margin-top: 10px;
      }
      .info-row {
        font-size: 12px;
        margin-bottom: 5px;
      }
      .info-label {
        font-weight: bold;
      }
      .dotted-fill {
        display: inline-block;
        border-bottom: 1px solid #333;
        width: 110px;
        margin-left: 4px;
      }

      /* ── End indicator ── */
      .end-indicator {
        text-align: center;
        margin-top: 24px;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 2px;
      }

      /* ── Context block ── */
      .context-block {
        padding: 10px 14px;
        margin-bottom: 12px;
        page-break-inside: avoid;
      }
      .context-label {
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin: 0 0 4px 0;
      }
      .context-title {
        font-weight: bold;
        font-size: 12px;
        margin: 0 0 5px 0;
      }
      .context-content {
        font-size: 12px;
        line-height: 1.65;
        margin: 0;
      }
      .context-author {
        font-size: 10px;
        font-style: italic;
        margin: 6px 0 0 0;
      }

      /* ── Section heading ── */
      .section-heading {
        font-size: 13px;
        font-weight: bold;
        border-bottom: 1px solid #ccc;
        padding-bottom: 3px;
        margin: 18px 0 10px 0;
      }

      /* ── Question block ── */
      .question-block {
        margin-bottom: 16px;
        page-break-inside: avoid;
      }
      .question-title {
        font-size: 13px;
        font-weight: bold;
        margin: 0 0 7px 0;
        line-height: 1.5;
      }
      .q-num {
      }
      .q-pts {
        font-size: 10px;
        font-weight: normal;
        margin-left: 4px;
      }

      /* ── Images ── */
      .question-image {
        max-width: 80%;
        max-height: 200px;
        margin: 4px 0 8px 0;
        display: block;
      }
      .option-image {
        max-width: 120px;
        max-height: 80px;
        margin: 2px 0;
        display: block;
      }
      .pair-image {
        max-width: 100px;
        max-height: 60px;
        margin: 2px 0;
        display: block;
      }

      /* ── MULTIPLE_CHOICE ── */
      .options-table {
        width: 100%;
        border-collapse: collapse;
      }
      .options-table td {
        padding: 3px 6px 3px 0;
        vertical-align: top;
        width: 50%;
        font-size: 12px;
      }
      .opt-letter {
        font-weight: bold;
        margin-right: 3px;
      }

      /* ── FILL_IN_BLANK ── */
      .fib-line {
        font-size: 13px;
        line-height: 2.2;
        margin: 0;
      }
      .blank {
        display: inline-block;
        border-bottom: 1.5px solid #333;
        min-width: 80px;
        margin: 0 2px;
      }

      /* ── OPEN_ENDED ── */
      .answer-line {
        border-bottom: 1px dashed #bbb;
        margin-bottom: 10px;
        height: 9px;
      }

      /* ── MATCHING ── */
      .matching-table {
        width: 100%;
        border-collapse: collapse;
      }
      .matching-table td {
        padding: 4px 8px;
        font-size: 12px;
        vertical-align: middle;
      }
      .match-left {
        width: 44%;
        border: 1px solid #999;
      }
      .match-arrow {
        width: 8%;
        text-align: center;
      }
      .match-right {
        width: 44%;
        border: 1px solid #999;
      }
      .match-id {
        font-weight: bold;
        margin-right: 4px;
      }

      /* ── Footer ── */
      .footer-bar {
        margin-top: 24px;
        padding-top: 8px;
        font-size: 11px;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <!-- ══════════════════ HEADER ══════════════════ -->
    <div class="header">
      <!-- Exam-style header: department/institution (left) + exam info (right) -->
      <th:block
        th:if="${exportRequest.headerConfig != null and exportRequest.headerConfig.useExamHeader}"
      >
        <table class="header-top">
          <tr>
            <td class="header-top-left">
              <p
                class="dept-name"
                th:if="${exportRequest.headerConfig.departmentName != null}"
                th:text="${exportRequest.headerConfig.departmentName}"
              >
                SỞ GD&amp;ĐT
              </p>
              <p
                class="inst-name"
                th:if="${exportRequest.headerConfig.institutionName != null}"
                th:text="${exportRequest.headerConfig.institutionName}"
              >
                TRƯỜNG
              </p>
            </td>
            <td class="header-top-right">
              <p
                class="exam-period"
                th:if="${exportRequest.headerConfig.examPeriod != null}"
                th:text="${exportRequest.headerConfig.examPeriod}"
              >
                KỲ THI
              </p>
              <p
                class="exam-subject"
                th:if="${assignment.subject != null}"
                th:text="'Môn: ' + ${assignment.subject}"
              >
                Môn:
              </p>
              <p
                class="exam-duration"
                th:if="${exportRequest.headerConfig.examDuration != null}"
                th:text="'Thời gian: ' + ${exportRequest.headerConfig.examDuration}"
              >
                Thời gian:
              </p>
            </td>
          </tr>
        </table>
      </th:block>

      <!-- Default header: centered title + badges -->
      <th:block
        th:unless="${exportRequest.headerConfig != null and exportRequest.headerConfig.useExamHeader}"
      >
        <div class="header-title-area">
          <p class="assignment-title" th:text="${assignment.title}">Title</p>
          <p class="meta-row">
            <span class="badge" th:text="'Môn: ' + ${assignment.subject}"
              >Subject</span
            >
            <span
              class="badge"
              th:if="${assignment.grade != null}"
              th:text="'Lớp ' + ${assignment.grade}"
              >Grade</span
            >
            <span
              class="badge"
              th:if="${exportRequest.headerConfig != null
                           and exportRequest.headerConfig.showChapter
                           and assignment.chapter != null}"
              th:text="'Chương ' + ${assignment.chapter}"
              >Chapter</span
            >
          </p>
          <p
            class="assignment-description"
            th:if="${exportRequest.headerConfig != null
                      and exportRequest.headerConfig.showDescription
                      and assignment.description != null
                      and !#strings.isEmpty(assignment.description)}"
            th:text="${assignment.description}"
          >
            Description
          </p>
        </div>
      </th:block>

      <hr class="header-separator" />

      <!-- Student info -->
      <div class="student-info">
        <p class="info-row">
          <span class="info-label">Họ và tên:</span
          ><span class="dotted-fill" style="width: 180px">&#160;</span>
        </p>
        <p class="info-row">
          <span class="info-label">Lớp:</span
          ><span class="dotted-fill" style="width: 55px">&#160;</span
          >&#160;&#160; <span class="info-label">Ngày:</span
          ><span class="dotted-fill" style="width: 55px">&#160;</span
          >&#160;&#160; <span class="info-label">Điểm:</span
          ><span class="dotted-fill" style="width: 55px">&#160;</span>
        </p>
      </div>
    </div>

    <!-- ══════════════════ SECTIONS (same order as Question List tab) ══════════════════ -->
    <div th:each="section : ${assignment.sections}">
      <!-- Context header (only for context sections) -->
      <div
        class="context-block"
        th:if="${section.type == 'context' and section.contextBlock != null}"
      >
        <p
          class="context-label"
          th:text="'Đọc đoạn văn sau và trả lời các câu hỏi từ ' + ${section.questions[0].number} + ' đến ' + ${section.questions[section.questions.size() - 1].number}"
        >
          Đọc đoạn văn sau
        </p>
        <p class="context-title" th:text="${section.contextBlock.title}">
          Title
        </p>
        <p class="context-content" th:text="${section.contextBlock.content}">
          Content.
        </p>
        <p
          class="context-author"
          th:if="${section.contextBlock.author != null}"
          th:text="'— ' + ${section.contextBlock.author}"
        >
          Author
        </p>
      </div>
      <!-- Questions in this section -->
      <div th:each="question : ${section.questions}" class="question-block">
        <p class="question-title">
          <span class="q-num" th:text="${question.number} + '.'">1.</span>
          <span th:text="${' ' + question.title}">Title</span>
          <span
            class="q-pts"
            th:if="${exportRequest.showQuestionPoints}"
            th:text="'(' + ${question.point} + ' đ)'"
          ></span>
        </p>
        <img
          th:if="${question.titleImageUrl != null}"
          th:src="${question.titleImageUrl}"
          class="question-image"
        />
        <!-- MULTIPLE_CHOICE -->
        <div
          th:if="${question.type.name() == 'MULTIPLE_CHOICE' and question.multipleChoiceData != null}"
        >
          <table class="options-table">
            <tr
              th:each="opt, s : ${question.multipleChoiceData.options}"
              th:if="${s.index % 2 == 0}"
            >
              <td>
                <span
                  class="opt-letter"
                  th:text="${'ABCDEFGHIJ'.substring(s.index, s.index + 1)} + '.'"
                  >A.</span
                ><span th:text="${opt.text}">Option</span>
                <img
                  th:if="${opt.imageUrl != null}"
                  th:src="${opt.imageUrl}"
                  class="option-image"
                />
              </td>
              <td
                th:if="${s.index + 1 < question.multipleChoiceData.options.size()}"
              >
                <span
                  class="opt-letter"
                  th:text="${'ABCDEFGHIJ'.substring(s.index + 1, s.index + 2)} + '.'"
                  >B.</span
                ><span
                  th:text="${question.multipleChoiceData.options[s.index + 1].text}"
                  >Option</span
                >
                <img
                  th:if="${question.multipleChoiceData.options[s.index + 1].imageUrl != null}"
                  th:src="${question.multipleChoiceData.options[s.index + 1].imageUrl}"
                  class="option-image"
                />
              </td>
              <td
                th:unless="${s.index + 1 < question.multipleChoiceData.options.size()}"
              ></td>
            </tr>
          </table>
        </div>
        <!-- FILL_IN_BLANK -->
        <p
          class="fib-line"
          th:if="${question.type.name() == 'FILL_IN_BLANK' and question.fillInBlankData != null}"
        >
          <th:block th:each="seg : ${question.fillInBlankData.segments}">
            <span
              th:if="${seg.type.name() == 'TEXT'}"
              th:text="${seg.content}"
            ></span>
            <span th:if="${seg.type.name() == 'BLANK'}" class="blank"
              >&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</span
            >
          </th:block>
        </p>
        <!-- OPEN_ENDED -->
        <div th:if="${question.type.name() == 'OPEN_ENDED'}">
          <div
            class="answer-line"
            th:each="i : ${#numbers.sequence(1, (question.openEndedData != null and question.openEndedData.maxLength != null and question.openEndedData.maxLength > 150) ? 5 : 3)}"
          ></div>
        </div>
        <!-- MATCHING -->
        <div
          th:if="${question.type.name() == 'MATCHING' and question.matchingData != null}"
        >
          <table class="matching-table">
            <tr th:each="pair, ps : ${question.matchingData.pairs}">
              <td class="match-left">
                <span class="match-id" th:text="${ps.count} + '.'">1.</span
                ><span th:text="${pair.left}">Left</span>
                <img
                  th:if="${pair.leftImageUrl != null}"
                  th:src="${pair.leftImageUrl}"
                  class="pair-image"
                />
              </td>
              <td class="match-arrow">&#8594;</td>
              <td class="match-right">
                <span
                  class="match-id"
                  th:text="${'ABCDEFGHIJ'.substring(ps.index, ps.index + 1)} + '.'"
                  >A.</span
                ><span th:text="${pair.right}">Right</span>
                <img
                  th:if="${pair.rightImageUrl != null}"
                  th:src="${pair.rightImageUrl}"
                  class="pair-image"
                />
              </td>
            </tr>
          </table>
        </div>
      </div>
    </div>

    <!-- ══════════════════ END INDICATOR ══════════════════ -->
    <div class="end-indicator">---- HẾT ----</div>

    <!-- ══════════════════ FOOTER ══════════════════ -->
    <div class="footer-bar">
      Tổng điểm: <strong th:text="${assignment.totalPoints}">0</strong> điểm
    </div>
  </body>
</html>
