<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title th:text="${assignment.title} + ' - Đáp án'">Answer Key</title>
    <style th:if="${theme.name() == 'CLASSIC'}">
      body {
        font-family: "LiberationSerif", serif;
        font-size: 13px;
        line-height: 1.5;
        color: #111;
        margin: 0;
        padding: 0;
      }
    </style>
    <style th:if="${theme.name() == 'FRIENDLY'}">
      body {
        font-family: "NotoSans", sans-serif;
        font-size: 14px;
        line-height: 1.7;
        color: #111;
        margin: 0;
        padding: 0;
      }
    </style>
    <style th:if="${theme.name() == 'COMPACT'}">
      body {
        font-family: "NotoSans", sans-serif;
        font-size: 11px;
        line-height: 1.35;
        color: #111;
        margin: 0;
        padding: 0;
      }
    </style>
    <style>
      @page {
        size: A4;
        margin: 20mm 18mm 20mm 18mm;
        @bottom-right {
          content: counter(page) " / " counter(pages);
          font-size: 11px;
          color: #888;
        }
      }

      /* ── Header ── */
      .header {
        margin-bottom: 14px;
      }
      .header-top {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 8px;
      }
      .header-top td {
        vertical-align: top;
        padding: 0;
        font-size: 12px;
      }
      .header-top-left {
        width: 50%;
        text-align: center;
      }
      .header-top-right {
        width: 50%;
        text-align: center;
      }
      .dept-name {
        font-weight: bold;
        text-transform: uppercase;
        font-size: 13px;
        margin: 0;
      }
      .inst-name {
        font-weight: bold;
        font-size: 13px;
        margin: 2px 0 0 0;
        text-decoration: underline;
      }
      .exam-period {
        font-weight: bold;
        text-transform: uppercase;
        font-size: 14px;
        margin: 0;
      }
      .exam-subject {
        font-size: 14px;
        margin: 2px 0 0 0;
      }
      .exam-duration {
        font-size: 13px;
        font-style: italic;
        margin: 2px 0 0 0;
      }
      .header-title-area {
        text-align: center;
        padding-bottom: 4px;
      }
      .assignment-title {
        font-size: 17px;
        font-weight: bold;
        margin: 0 0 4px 0;
      }
      .assignment-description {
        font-size: 11px;
        margin: 3px 0 0 0;
        font-style: italic;
      }
      .meta-row {
        font-size: 11px;
        margin: 3px 0 0 0;
      }
      .badge {
        display: inline-block;
        font-size: 10px;
        margin-right: 4px;
      }
      .header-separator {
        border: none;
        border-top: 1px solid #ccc;
        margin: 10px 0 0 0;
      }
      .answer-doc-label {
        text-align: center;
        font-size: 14px;
        font-weight: bold;
        margin: 10px 0 0 0;
      }

      /* ── Context block ── */
      .context-block {
        padding: 10px 14px;
        margin-bottom: 12px;
        page-break-inside: avoid;
      }
      .context-label {
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin: 0 0 4px 0;
      }
      .context-title {
        font-weight: bold;
        font-size: 12px;
        margin: 0 0 5px 0;
      }
      .context-content {
        font-size: 12px;
        line-height: 1.65;
        margin: 0;
      }
      .context-author {
        font-size: 10px;
        font-style: italic;
        margin: 6px 0 0 0;
      }

      /* ── Question block ── */
      .question-block {
        margin-bottom: 16px;
        page-break-inside: avoid;
      }
      .question-title {
        font-size: 13px;
        font-weight: bold;
        margin: 0 0 7px 0;
        line-height: 1.5;
      }
      .q-num {
      }
      .q-pts {
        font-size: 10px;
        font-weight: normal;
        margin-left: 4px;
      }

      /* ── MULTIPLE_CHOICE options ── */
      .options-table {
        width: 100%;
        border-collapse: collapse;
      }
      .options-table td {
        padding: 3px 6px 3px 0;
        vertical-align: top;
        width: 50%;
        font-size: 12px;
      }
      .opt-letter {
        font-weight: bold;
        margin-right: 3px;
      }

      /* ── FILL_IN_BLANK ── */
      .fib-line {
        font-size: 13px;
        line-height: 2.2;
        margin: 0;
      }
      .blank {
        display: inline-block;
        border-bottom: 1.5px solid #333;
        min-width: 80px;
        margin: 0 2px;
      }

      /* ── MATCHING ── */
      .matching-table {
        width: 100%;
        border-collapse: collapse;
      }
      .matching-table td {
        padding: 4px 8px;
        font-size: 12px;
        vertical-align: middle;
      }
      .match-left {
        width: 44%;
        border: 1px solid #999;
      }
      .match-arrow {
        width: 8%;
        text-align: center;
      }
      .match-right {
        width: 44%;
        border: 1px solid #999;
      }
      .match-id {
        font-weight: bold;
        margin-right: 4px;
      }

      /* ── Inline answer ── */
      .inline-answer {
        padding: 5px 10px;
        margin-top: 6px;
        font-size: 12px;
      }
      .inline-answer-label {
        font-weight: bold;
        margin-right: 4px;
      }
      .inline-answer-text {
        font-weight: bold;
        text-decoration: underline;
      }
      .inline-answer-fib {
        font-style: italic;
      }

      /* ── Explanation ── */
      .explanation {
        font-size: 11px;
        font-style: italic;
        padding: 4px 10px;
        margin-top: 4px;
      }

      /* ── End indicator ── */
      .end-indicator {
        text-align: center;
        margin-top: 24px;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 2px;
      }

      /* ── Footer ── */
      .footer-bar {
        margin-top: 24px;
        padding-top: 8px;
        font-size: 11px;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <!-- ══════════════════ HEADER ══════════════════ -->
    <div class="header">
      <!-- Exam-style header -->
      <th:block
        th:if="${exportRequest.headerConfig != null and exportRequest.headerConfig.useExamHeader}"
      >
        <table class="header-top">
          <tr>
            <td class="header-top-left">
              <p
                class="dept-name"
                th:if="${exportRequest.headerConfig.departmentName != null}"
                th:text="${exportRequest.headerConfig.departmentName}"
              >
                SỞ GD&amp;ĐT
              </p>
              <p
                class="inst-name"
                th:if="${exportRequest.headerConfig.institutionName != null}"
                th:text="${exportRequest.headerConfig.institutionName}"
              >
                TRƯỜNG
              </p>
            </td>
            <td class="header-top-right">
              <p
                class="exam-period"
                th:if="${exportRequest.headerConfig.examPeriod != null}"
                th:text="${exportRequest.headerConfig.examPeriod}"
              >
                KỲ THI
              </p>
              <p
                class="exam-subject"
                th:if="${assignment.subject != null}"
                th:text="'Môn: ' + ${assignment.subject}"
              >
                Môn:
              </p>
              <p
                class="exam-duration"
                th:if="${exportRequest.headerConfig.examDuration != null}"
                th:text="'Thời gian: ' + ${exportRequest.headerConfig.examDuration}"
              >
                Thời gian:
              </p>
            </td>
          </tr>
        </table>
      </th:block>

      <!-- Default header: centered title + badges -->
      <th:block
        th:unless="${exportRequest.headerConfig != null and exportRequest.headerConfig.useExamHeader}"
      >
        <div class="header-title-area">
          <p class="assignment-title" th:text="${assignment.title}">Title</p>
          <p class="meta-row">
            <span class="badge" th:text="'Môn: ' + ${assignment.subject}"
              >Subject</span
            >
            <span
              class="badge"
              th:if="${assignment.grade != null}"
              th:text="'Lớp ' + ${assignment.grade}"
              >Grade</span
            >
            <span
              class="badge"
              th:if="${exportRequest.headerConfig != null
                           and exportRequest.headerConfig.showChapter
                           and assignment.chapter != null}"
              th:text="'Chương ' + ${assignment.chapter}"
              >Chapter</span
            >
          </p>
          <p
            class="assignment-description"
            th:if="${exportRequest.headerConfig != null
                      and exportRequest.headerConfig.showDescription
                      and assignment.description != null
                      and !#strings.isEmpty(assignment.description)}"
            th:text="${assignment.description}"
          >
            Description
          </p>
        </div>
      </th:block>

      <hr class="header-separator" />
      <p class="answer-doc-label">ĐÁP ÁN</p>
    </div>

    <!-- ══════════════════ SECTIONS ══════════════════ -->
    <div th:each="section : ${assignment.sections}">
      <!-- Context header -->
      <div
        class="context-block"
        th:if="${section.type == 'context' and section.contextBlock != null}"
      >
        <p class="context-label">Đọc đoạn văn sau</p>
        <p class="context-title" th:text="${section.contextBlock.title}">
          Title
        </p>
        <p class="context-content" th:text="${section.contextBlock.content}">
          Content.
        </p>
        <p
          class="context-author"
          th:if="${section.contextBlock.author != null}"
          th:text="'— ' + ${section.contextBlock.author}"
        >
          Author
        </p>
      </div>

      <!-- Questions with inline answers -->
      <div th:each="question : ${section.questions}" class="question-block">
        <p class="question-title">
          <span class="q-num" th:text="${question.number} + '.'">1.</span>
          <span th:text="${' ' + question.title}">Title</span>
          <span
            class="q-pts"
            th:if="${exportRequest.showQuestionPoints}"
            th:text="'(' + ${question.point} + ' đ)'"
          ></span>
        </p>

        <!-- MULTIPLE_CHOICE: show options then correct answer -->
        <div
          th:if="${question.type.name() == 'MULTIPLE_CHOICE' and question.multipleChoiceData != null}"
        >
          <table class="options-table">
            <tr
              th:each="opt, s : ${question.multipleChoiceData.options}"
              th:if="${s.index % 2 == 0}"
            >
              <td>
                <span
                  class="opt-letter"
                  th:text="${'ABCDEFGHIJ'.substring(s.index, s.index + 1)} + '.'"
                  >A.</span
                ><span th:text="${opt.text}">Option</span>
              </td>
              <td
                th:if="${s.index + 1 < question.multipleChoiceData.options.size()}"
              >
                <span
                  class="opt-letter"
                  th:text="${'ABCDEFGHIJ'.substring(s.index + 1, s.index + 2)} + '.'"
                  >B.</span
                ><span
                  th:text="${question.multipleChoiceData.options[s.index + 1].text}"
                  >Option</span
                >
              </td>
              <td
                th:unless="${s.index + 1 < question.multipleChoiceData.options.size()}"
              ></td>
            </tr>
          </table>
          <!-- Inline answer: correct option -->
          <div class="inline-answer">
            <span class="inline-answer-label">Đáp án:</span>
            <th:block th:each="opt, s : ${question.multipleChoiceData.options}">
              <span
                class="inline-answer-text"
                th:if="${opt.isCorrect}"
                th:text="${'ABCDEFGHIJ'.substring(s.index, s.index + 1)} + '. ' + ${opt.text}"
                >A. Answer</span
              >
            </th:block>
          </div>
        </div>

        <!-- FILL_IN_BLANK: show sentence then filled-in answer -->
        <th:block
          th:if="${question.type.name() == 'FILL_IN_BLANK' and question.fillInBlankData != null}"
        >
          <p class="fib-line">
            <th:block th:each="seg : ${question.fillInBlankData.segments}">
              <span
                th:if="${seg.type.name() == 'TEXT'}"
                th:text="${seg.content}"
              ></span>
              <span th:if="${seg.type.name() == 'BLANK'}" class="blank"
                >&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</span
              >
            </th:block>
          </p>
          <!-- Inline answer: filled blanks -->
          <div class="inline-answer">
            <span class="inline-answer-label">Đáp án:</span>
            <span class="inline-answer-fib">
              <th:block th:each="seg : ${question.fillInBlankData.segments}">
                <span
                  th:if="${seg.type.name() == 'TEXT'}"
                  th:text="${seg.content}"
                ></span>
                <span
                  th:if="${seg.type.name() == 'BLANK'}"
                  class="inline-answer-text"
                  th:text="'[' + ${seg.content} + ']'"
                ></span>
              </th:block>
            </span>
          </div>
        </th:block>

        <!-- OPEN_ENDED: show expected answer -->
        <div th:if="${question.type.name() == 'OPEN_ENDED'}">
          <div class="inline-answer"
               th:if="${question.openEndedData != null and question.openEndedData.expectedAnswer != null}">
            <span class="inline-answer-label">Đáp án:</span>
            <span
              class="inline-answer-text"
              th:text="${question.openEndedData.expectedAnswer}"
              >Answer</span
            >
          </div>
        </div>

        <!-- MATCHING: show pairs then correct mapping -->
        <div
          th:if="${question.type.name() == 'MATCHING' and question.matchingData != null}"
        >
          <table class="matching-table">
            <tr th:each="pair, ps : ${question.matchingData.pairs}">
              <td class="match-left">
                <span class="match-id" th:text="${ps.count} + '.'">1.</span
                ><span th:text="${pair.left}">Left</span>
              </td>
              <td class="match-arrow">&#8594;</td>
              <td class="match-right">
                <span
                  class="match-id"
                  th:text="${'ABCDEFGHIJ'.substring(ps.index, ps.index + 1)} + '.'"
                  >A.</span
                ><span th:text="${pair.right}">Right</span>
              </td>
            </tr>
          </table>
          <!-- Inline answer: correct pairings -->
          <div class="inline-answer">
            <span class="inline-answer-label">Đáp án:</span>
            <th:block th:each="pair, ps : ${question.matchingData.pairs}">
              <span
                class="inline-answer-text"
                th:text="${ps.count} + '-' + ${'ABCDEFGHIJ'.substring(ps.index, ps.index + 1)}"
              ></span>
              <span th:if="${!ps.last}">&#160;&#160;</span>
            </th:block>
          </div>
        </div>

        <!-- Explanation -->
        <div
          class="explanation"
          th:if="${exportRequest.showExplanations and question.type.name() == 'OPEN_ENDED' and question.openEndedData != null and question.openEndedData.expectedAnswer != null}"
        >
          <span
            th:text="'Gợi ý: ' + ${question.openEndedData.expectedAnswer}"
            >Hint</span
          >
        </div>
      </div>
    </div>

    <!-- ══════════════════ END INDICATOR ══════════════════ -->
    <div class="end-indicator">---- HẾT ----</div>

    <!-- ══════════════════ FOOTER ══════════════════ -->
    <div class="footer-bar">
      Tổng điểm: <strong th:text="${assignment.totalPoints}">0</strong> điểm
    </div>
  </body>
</html>
